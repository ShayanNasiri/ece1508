[output]
run_id = "smollm2-baseline"
artifacts_root = "artifacts/runs"

[data]
dataset_path = "data/processed/recipe_mpr_qa.jsonl"
split_manifest_path = "data/processed/primary_split.json"
split = "test"

[tracking]
enabled = false
experiment_name = "recipe-mpr-qa"

[slm]
mode = "causal_baseline"
model_name = "HuggingFaceTB/SmolLM2-135M-Instruct"
prompt_version = "recipe-mpr-chat-mc-v1"
max_length = 512
max_new_tokens = 8
temperature = 0.0
top_p = 0.9
